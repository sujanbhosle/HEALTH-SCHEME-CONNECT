
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Scheme & Hospital Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light dark;
        --color-primary-blue: #0066CC;
        --color-primary-green: #00A878;
        --color-secondary-orange: #FF8C42;
        --color-secondary-purple: #6B4CE6;
        --color-success: #10B981;
        --color-warning: #F59E0B;
        --color-error: #EF4444;
        --color-info: #3B82F6;
        --color-bg-primary: #F9FAFB;
        --color-bg-secondary: #FFFFFF;
        --color-bg-dark: #1F2937;
        --color-text-primary: #111827;
        --color-text-secondary: #4B5563;
        --color-text-muted: #9CA3AF;
      }
      html.dark {
        --color-bg-primary: #111827;
        --color-bg-secondary: #1F2937;
        --color-bg-dark: #000000;
        --color-text-primary: #F9FAFB;
        --color-text-secondary: #D1D5DB;
        --color-text-muted: #9CA3AF;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s, color 0.3s;
      }
      h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
    </style>
     <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
      } else {
          document.documentElement.classList.remove('dark');
      }
    </script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Poppins', 'sans-serif'],
            },
            colors: {
              'primary-blue': 'var(--color-primary-blue)',
              'primary-green': 'var(--color-primary-green)',
              'secondary-orange': 'var(--color-secondary-orange)',
              'secondary-purple': 'var(--color-secondary-purple)',
              'success': 'var(--color-success)',
              'warning': 'var(--color-warning)',
              'error': 'var(--color-error)',
              'info': 'var(--color-info)',
              'bg-primary': 'var(--color-bg-primary)',
              'bg-secondary': 'var(--color-bg-secondary)',
              'bg-dark': 'var(--color-bg-dark)',
              'text-primary': 'var(--color-text-primary)',
              'text-secondary': 'var(--color-text-secondary)',
              'text-muted': 'var(--color-text-muted)',
            }
          }
        }
      }
    </script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body class="bg-bg-primary">
    <div id="root"></div>
    <!-- Vite handles module resolution automatically from index.tsx -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
